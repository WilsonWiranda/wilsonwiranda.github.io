name: Deploy P-11.50

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build timestamp into sw.js
        run: |
          BUILD_TS=$(date +%s)
          echo "BUILD_TS=$BUILD_TS"
          sed -i "s/{{BUILD_TS}}/$BUILD_TS/g" sw.js
          echo "sw.js cache name: trailmate-$BUILD_TS"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: false
          exclude_assets: '.github,*.md,*.json'
